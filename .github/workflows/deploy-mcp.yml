name: Deploy MCP Server

on:
  push:
    branches: [main]
    paths:
      - "data/use-cases.json"
      - "data/use-cases/**"
      - "data/catalog.json"
      - "data/packages/**"
      - "mcp/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4"
          workingDirectory: mcp
