# Build the Vue/Vite frontend AND the JupyterLite distribution, both via pixi,
# then deploy the combined dist/ tree to GitHub Pages.
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pixi (default + jupyterlite environments)
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: true
          environments: default jupyterlite

      - name: Build site (dist/ + dist/jupyterlite/)
        run: pixi run build

      # Forks can override the bundled CNAME by setting the PAGES_CNAME repo
      # variable. Upstream leaves it unset and ships the canonical domain.
      - name: Override CNAME for forks
        if: vars.PAGES_CNAME != ''
        run: echo "${{ vars.PAGES_CNAME }}" > dist/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
