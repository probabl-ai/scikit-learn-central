# Build the Vue/Vite frontend AND the JupyterLite distribution, both via pixi,
# then deploy the combined dist/ tree to GitHub Pages.
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pixi (default + jupyterlite environments)
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4
        with:
          pixi-version: latest
          cache: true
          environments: default jupyterlite

      - name: Build site (dist/ + dist/jupyterlite/)
        run: pixi run build

      # Forks can override the bundled CNAME by setting the PAGES_CNAME repo
      # variable. Upstream leaves it unset and ships the canonical domain.
      # The value is read from an env var (not interpolated into the shell)
      # so a CNAME containing shell metacharacters can't escape into code.
      - name: Override CNAME for forks
        if: vars.PAGES_CNAME != ''
        env:
          PAGES_CNAME: ${{ vars.PAGES_CNAME }}
        run: printf '%s\n' "$PAGES_CNAME" > dist/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
