<!DOCTYPE html>
<!--
  OG image template — 1200 × 630 px
  To export: open in Chrome, zoom to 100%, screenshot the <body> element,
  or use: npx playwright screenshot --viewport-size=1200,630 og-image.html og-image.png
  Then place og-image.png alongside this file.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;600&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'Geist', sans-serif;
      background: #1E22AA;
      color: #ffffff;
      position: relative;
    }

    /* Subtle grid pattern */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Decorative orange arc — top-right */
    body::after {
      content: '';
      position: absolute;
      top: -180px;
      right: -180px;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      border: 60px solid #F68D2E;
      opacity: .18;
    }

    .inner {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      padding: 56px 72px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* ── Top row ── */
    .top {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: .02em;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #F68D2E;
      flex-shrink: 0;
    }

    /* ── Main content ── */
    .main { flex: 1; display: flex; flex-direction: column; justify-content: center; }

    .title {
      font-size: 76px;
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -.02em;
      margin-bottom: 20px;
    }

    .title em {
      font-style: normal;
      color: #F68D2E;
    }

    .subtitle {
      font-size: 26px;
      font-weight: 400;
      color: rgba(255,255,255,.72);
      letter-spacing: .01em;
    }

    /* ── Bottom row ── */
    .bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .pills {
      display: flex;
      gap: 12px;
    }

    .pill {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 15px;
      font-weight: 500;
      font-family: 'Geist Mono', monospace;
      color: rgba(255,255,255,.88);
    }

    .brand {
      font-size: 18px;
      font-weight: 600;
      color: rgba(255,255,255,.55);
      letter-spacing: .04em;
    }

    .brand span { color: #F68D2E; }
  </style>
</head>
<body>
  <div class="inner">

    <div class="top">
      <div class="badge">
        <span class="dot"></span>
        scikit-learn ecosystem
      </div>
    </div>

    <div class="main">
      <h1 class="title">Scikit-learn<br><em>Central</em></h1>
      <p class="subtitle">Packages &nbsp;·&nbsp; Use Cases &nbsp;·&nbsp; Releases</p>
    </div>

    <div class="bottom">
      <div class="pills">
        <div class="pill">catalog</div>
        <div class="pill">use-cases</div>
        <div class="pill">releases</div>
      </div>
      <div class="brand">by <span>:probabl.</span></div>
    </div>

  </div>
</body>
</html>
