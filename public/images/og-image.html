<!DOCTYPE html>
<!--
  OG image template — 1200 × 630 px
  Export:
    cd public/images
    npx playwright screenshot --viewport-size=1200,630 og-image.html og-image-1200x630.png
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@300;400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: "Switzer";
      font-weight: 400;
      font-style: normal;
      font-display: swap;
      src: url("../fonts/Switzer-Regular.woff2") format("woff2");
    }
    @font-face {
      font-family: "Switzer";
      font-weight: 500;
      font-style: normal;
      font-display: swap;
      src: url("../fonts/Switzer-Medium.woff2") format("woff2");
    }

    :root {
      --color-midnight: #040524;
      --color-midnight-line: #34366d;
      --color-orange: #ff7900;
      --orange-200: #ffc48a;
      --radius-sm: 2px;
      --radius-logo: 5px;
      --color-sky: #4cd0ff;
      --color-mist: #ccccd7;
      --color-near-black: #0f101c;
      --text-inverse: #ffffff;
      --text-on-dark-secondary: rgb(255 255 255 / 0.65);
      --text-on-dark-muted: rgb(255 255 255 / 0.55);
      --surface-on-dark-raised: rgb(255 255 255 / 0.12);
      --border-on-dark-default: rgb(255 255 255 / 0.18);
      --font-serif: "IBM Plex Serif", Georgia, serif;
      --font-sans: "Switzer", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: var(--font-sans);
      background: var(--color-midnight);
      color: var(--text-inverse);
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgb(255 255 255 / 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgb(255 255 255 / 0.06) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      top: -120px;
      right: 200px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgb(76 208 255 / 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .accent-blob {
      position: absolute;
      bottom: -80px;
      left: -60px;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgb(255 121 0 / 0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .inner {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      padding: 52px 64px 48px 72px;
      display: flex;
      flex-direction: column;
    }

    .content-row {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 40px;
      min-height: 0;
    }

    .left {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--color-sky);
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .badge::before {
      content: '';
      display: inline-block;
      width: 26px;
      height: 16px;
      background-image: url('spark.svg');
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      flex-shrink: 0;
    }

    .title {
      font-family: var(--font-serif);
      font-size: 76px;
      font-weight: 300;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    .title em {
      font-style: normal;
      color: var(--color-orange);
    }

    .subtitle {
      font-size: 24px;
      font-weight: 400;
      color: var(--color-mist);
      letter-spacing: 0.01em;
      line-height: 1.35;
      max-width: 520px;
    }

    .logo-col {
      flex-shrink: 0;
      width: 360px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* White ring outside orange border via margin on the bordered box */
    .logo-frame {
      background: #ffffff;
      border-radius: var(--radius-logo);
      display: inline-flex;
      overflow: hidden;
    }

    /* Matches .panel--fit on package catalog cards */
    .logo-wrap {
      position: relative;
      overflow: visible;
      isolation: isolate;
      margin: 2px;
      background: #ffffff;
      border: 1px solid var(--orange-200);
      border-radius: var(--radius-sm);
      padding: 24px 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-wrap::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: var(--radius-sm);
      pointer-events: none;
      z-index: 0;
      background-repeat: no-repeat;
      background-image:
        linear-gradient(var(--color-orange), var(--color-orange)),
        linear-gradient(var(--color-orange), var(--color-orange)),
        linear-gradient(var(--color-orange), var(--color-orange)),
        linear-gradient(var(--color-orange), var(--color-orange)),
        linear-gradient(var(--color-orange), var(--color-orange)),
        linear-gradient(var(--color-orange), var(--color-orange)),
        linear-gradient(var(--color-orange), var(--color-orange)),
        linear-gradient(var(--color-orange), var(--color-orange));
      background-size:
        2px 11px,
        11px 2px,
        2px 11px,
        11px 2px,
        2px 11px,
        11px 2px,
        2px 11px,
        11px 2px;
      background-position:
        left 0 top 0,
        left 0 top 0,
        right 0 top 0,
        right 0 top 0,
        left 0 bottom 0,
        left 0 bottom 0,
        right 0 bottom 0,
        right 0 bottom 0;
    }

    .logo-wrap img {
      position: relative;
      z-index: 1;
      width: 240px;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
      padding-top: 24px;
    }

    .pills {
      display: flex;
      gap: 12px;
    }

    .pill {
      background: var(--surface-on-dark-raised);
      border: 1px solid var(--border-on-dark-default);
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 500;
      font-family: var(--font-mono);
      color: rgb(255 255 255 / 0.88);
    }

    .brand {
      font-size: 17px;
      font-weight: 500;
      color: var(--text-on-dark-muted);
      letter-spacing: 0.04em;
    }

    .brand span {
      color: var(--color-orange);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="accent-blob" aria-hidden="true"></div>
  <div class="inner">

    <div class="content-row">
      <div class="left">
        <div class="badge">Ecosystem catalog</div>
        <h1 class="title">scikit-learn<br><em>Central</em></h1>
        <p class="subtitle">Ecosystem catalog &amp; use case explorer</p>
      </div>
      <div class="logo-col">
        <div class="logo-frame">
          <div class="logo-wrap">
          <img
            src="https://scikit-learn.org/stable/_static/scikit-learn-logo-notext.png"
            alt=""
            onerror="this.onerror=null;this.src='https://upload.wikimedia.org/wikipedia/commons/0/05/Scikit_learn_logo_small.svg';"
          />
          </div>
        </div>
      </div>
    </div>

    <div class="bottom">
      <div class="pills">
        <div class="pill">catalog</div>
        <div class="pill">use-cases</div>
        <div class="pill">releases</div>
      </div>
      <div class="brand">by <span>:probabl.</span></div>
    </div>

  </div>
</body>
</html>
